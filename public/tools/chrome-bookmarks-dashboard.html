  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #18202a;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 3;
      padding: 18px 24px 14px;
      background: rgba(246, 247, 249, .94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }
    h1 { margin: 0 0 8px; font-size: 22px; }
    .meta { color: var(--muted); display: flex; gap: 16px; flex-wrap: wrap; }
    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) repeat(5, max-content);
      gap: 10px;
      margin-top: 14px;
      align-items: center;
    }
    input, select, button {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 0 10px;
      color: var(--text);
    }
    button { cursor: pointer; }
    button.active { border-color: var(--accent); color: var(--accent); font-weight: 600; }
    main { padding: 18px 24px 40px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      text-align: left;
      height: auto;
      cursor: pointer;
    }
    .stat:hover { border-color: var(--accent); box-shadow: 0 4px 14px rgba(37, 99, 235, .12); }
    .stat.active { border-color: var(--accent); color: var(--accent); }
    .stat strong { display: block; font-size: 22px; }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }
    .card {
      display: block;
      min-height: 132px;
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      text-decoration: none;
      overflow: hidden;
    }
    .card:hover { border-color: var(--accent); box-shadow: 0 6px 18px rgba(37, 99, 235, .14); text-decoration: none; }
    .card-title { font-weight: 650; font-size: 15px; margin: 8px 0 8px; overflow-wrap: anywhere; }
    .card-url { color: var(--muted); font-size: 12px; overflow-wrap: anywhere; }
    .card-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; color: var(--muted); font-size: 12px; }
    .view-hidden { display: none; }
    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--line); vertical-align: top; }
    th { background: #fbfcfe; color: var(--muted); text-align: left; font-weight: 600; white-space: nowrap; }
    tr:hover td { background: #f8fbff; }
    tbody tr { cursor: pointer; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .title { width: 30%; }
    .path { width: 22%; color: var(--muted); }
    .date { width: 130px; color: var(--muted); }
    .count { width: 88px; text-align: right; }
    .small { color: var(--muted); font-size: 12px; margin-top: 3px; overflow-wrap: anywhere; }
    .pill {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 12px;
      margin-bottom: 4px;
      cursor: pointer;
    }
    .empty { padding: 22px; color: var(--muted); text-align: center; }
    @media (max-width: 1000px) {
      .controls { grid-template-columns: 1fr 1fr; }
      .stats { grid-template-columns: 1fr 1fr; }
      .path, .date:nth-of-type(5) { display: none; }
    }
  </style>
</head>
